        <style>
            /* Modal styling */
            .modal {
                display: none;
                position: fixed;
                z-index: 1000;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0,0,0,0.8);
                animation: fadeIn 0.3s;
            }

            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }

            .modal-content {
                margin: auto;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100%;
                position: relative;
            }

            .modal img {
                max-width: 90%;
                max-height: 90%;
                object-fit: contain;
                animation: zoomIn 0.3s;
            }

            @keyframes zoomIn {
                from { transform: scale(0.9); opacity: 0; }
                to { transform: scale(1); opacity: 1; }
            }

            .close {
                position: absolute;
                right: 20px;
                top: 20px;
                color: white;
                font-size: 32px;
                font-weight: bold;
                cursor: pointer;
                z-index: 1001;
                transition: color 0.2s;
            }

            .close:hover {
                color: #bbb;
            }

            /* Make images clickable */
            .gallery .item {
                cursor: pointer;
                transition: transform 0.2s;
            }

            .gallery .item:hover {
                transform: scale(1.02);
            }
        </style>
    </head>
